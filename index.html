<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASM — Espace Équipe</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C9A84C;
      --gold-l: #E2C97A;
      --gold-d: #7A5E1A;
      --ink: #0E0B06;
      --ink2: #181208;
      --ink3: #221A0C;
      --cream: #F0E4C8;
      --cream2: #D8C9A8;
      --cream3: #9A8A6A;
      --red: #7A1A1A;
      --border: rgba(201,168,76,0.18);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Crimson Pro', serif;
      background: var(--ink);
      color: var(--cream);
      min-height: 100vh;
    }
    #login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .login-box {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      padding: 0 20px;
    }
    .login-header { text-align: center; margin-bottom: 36px; }
    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--cream);
    }
    .login-sub {
      font-size: 13px;
      font-style: italic;
      color: var(--cream3);
    }
    .login-card {
      background: var(--ink2);
      border: 1px solid var(--border);
      padding: 36px 32px;
    }
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--cream3);
      margin-bottom: 8px;
    }
    .field select, .field input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--cream);
      font-family: 'Crimson Pro', serif;
      font-size: 15px;
      padding: 10px 14px;
      outline: none;
    }
    .field select:focus, .field input:focus { border-color: var(--gold); }
    .login-error {
      background: rgba(122,26,26,0.3);
      border: 1px solid var(--red);
      color: #E89090;
      font-size: 13px;
      padding: 8px 12px;
      margin-bottom: 20px;
      display: none;
    }
    .btn-login {
      width: 100%;
      background: var(--gold);
      color: var(--ink);
      font-family: 'Crimson Pro', serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 12px;
      border: none;
      cursor: pointer;
    }
    .btn-login:hover { background: var(--gold-l); }
    
    /* Dashboard */
    #dashboard { display: none; min-height: 100vh; }
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 250px;
      background: var(--ink2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .sidebar-brand { padding: 28px 20px 20px; border-bottom: 1px solid var(--border); }
    .sidebar-logo {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--gold);
    }
    .sidebar-user {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-avatar {
      width: 42px; height: 42px;
      background: var(--gold-d);
      border: 1px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .user-name { font-size: 15px; font-weight: 500; }
    .user-role { font-size: 11px; color: var(--gold); font-style: italic; }
    .sidebar-nav { flex: 1; padding: 20px 0; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      cursor: pointer;
      color: var(--cream2);
      border-left: 2px solid transparent;
    }
    .nav-item:hover { background: rgba(255,255,255,0.04); }
    .nav-item.active {
      background: rgba(201,168,76,0.1);
      color: var(--gold);
      border-left-color: var(--gold);
    }
    .sidebar-footer { padding: 20px; border-top: 1px solid var(--border); }
    .btn-logout {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--cream3);
      padding: 8px;
      cursor: pointer;
    }
    .main { margin-left: 250px; }
    .topbar {
      height: 64px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 36px;
      background: rgba(14,11,6,0.85);
    }
    .content { padding: 32px 36px; }
    .panel { display: none; }
    .panel.active { display: block; }
    .welcome-banner {
      background: var(--ink3);
      border: 1px solid var(--border);
      padding: 24px 32px;
      margin-bottom: 28px;
    }
    .welcome-text { font-family: 'Playfair Display', serif; font-size: 24px; }
    .card {
      background: var(--ink3);
      border: 1px solid var(--border);
      padding: 22px;
      margin-bottom: 20px;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      display: flex;
      justify-content: space-between;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .btn-add {
      background: var(--gold);
      color: var(--ink);
      border: none;
      padding: 5px 12px;
      cursor: pointer;
    }
    .tasks-list { display: flex; flex-direction: column; gap: 10px; }
    .task-item {
      background: var(--ink3);
      border: 1px solid var(--border);
      padding: 14px 18px;
      display: grid;
      grid-template-columns: auto 1fr auto auto auto;
      align-items: center;
      gap: 12px;
    }
    .task-check {
      width: 20px; height: 20px;
      border: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .task-check.done { background: var(--gold); }
    .task-check.done::after { content: '✓'; color: var(--ink); }
    .task-prio {
      font-size: 10px;
      padding: 3px 8px;
    }
    .prio-haute { background: rgba(122,26,26,0.4); color: #E89090; }
    .prio-moyenne { background: rgba(201,168,76,0.2); color: var(--gold); }
    .prio-basse { background: rgba(26,74,42,0.4); color: #7EC89A; }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--ink2);
      border: 1px solid var(--border);
      padding: 32px;
      width: 100%;
      max-width: 500px;
    }
    .modal-close-btn {
      float: right;
      background: none;
      border: none;
      color: var(--cream3);
      font-size: 24px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- PAGE DE CONNEXION -->
<div id="login-page">
  <div class="login-box">
    <div class="login-header">
      <h1 class="login-title">Athanase Stories Makers</h1>
      <p class="login-sub">Espace Équipe — Accès Restreint</p>
    </div>
    <div class="login-card">
      <div class="login-error" id="login-error"></div>
      <div class="field">
        <label>Rôle</label>
        <select id="login-role">
          <option value="">Sélectionner...</option>
          <option value="ddp">Directeur de Projet (DDP)</option>
          <option value="ddpa">Directeur Adjoint (DDPA)</option>
          <option value="resp-dev">Responsable Développement (RD)</option>
          <option value="developpeur">Développeur</option>
          <option value="builder">Builder</option>
          <option value="scripteur">Scripteur</option>
          <option value="testeur">Testeur</option>
          <option value="voix">Voix</option>
        </select>
      </div>
      <div class="field">
        <label>Identifiant</label>
        <input type="text" id="login-user" placeholder="identifiant">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="login-pass" placeholder="mot de passe">
      </div>
      <button class="btn-login" id="loginBtn">ACCÉDER</button>
      <p class="login-sub" style="margin-top:20px;text-align:center">Contactez la direction</p>
    </div>
  </div>
</div>

<!-- TABLEAU DE BORD -->
<div id="dashboard">
  <div class="sidebar">
    <div class="sidebar-brand"><div class="sidebar-logo">Athanase Stories Makers</div></div>
    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar">?</div>
      <div>
        <div class="user-name" id="user-name"></div>
        <div class="user-role" id="user-role-label"></div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-panel="home">◈ Tableau de bord</div>
      <div class="nav-item" data-panel="tasks">◻ Tâches</div>
      <div class="nav-item" data-panel="membres">◉ Membres</div>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" id="logoutBtn">Déconnexion</button>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Tableau de bord</div>
      <div id="topbar-date"></div>
    </div>
    <div class="content">
      <!-- PANEL ACCUEIL -->
      <div class="panel active" id="panel-home">
        <div class="welcome-banner">
          <div class="welcome-text" id="welcome-msg"></div>
        </div>
        <div class="card">
          <div class="card-title">Tâches récentes <button class="btn-add" id="btn-add-task">+ Ajouter</button></div>
          <div id="tasks-list" class="tasks-list">Chargement...</div>
        </div>
        <div class="card">
          <div class="card-title">Membres de l'équipe</div>
          <div id="membres-list"></div>
        </div>
      </div>
      
      <!-- PANEL TÂCHES -->
      <div class="panel" id="panel-tasks">
        <div class="card">
          <div class="card-title">Toutes les tâches <button class="btn-add" id="btn-add-task-full">+ Ajouter</button></div>
          <div id="all-tasks-list" class="tasks-list"></div>
        </div>
      </div>
      
      <!-- PANEL MEMBRES -->
      <div class="panel" id="panel-membres">
        <div class="card">
          <div class="card-title">Gestion des membres <button class="btn-add" id="btn-add-membre">+ Ajouter</button></div>
          <div id="membres-full-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODALE TÂCHE -->
<div class="modal-overlay" id="taskModal">
  <div class="modal-box">
    <button class="modal-close-btn" data-close="taskModal">✕</button>
    <h3 id="taskModalTitle">Nouvelle tâche</h3>
    <input type="hidden" id="taskEditId">
    <div class="field"><label>Titre</label><input type="text" id="taskName" style="width:100%"></div>
    <div class="field"><label>Assigné à</label><select id="taskAssignee" style="width:100%"></select></div>
    <div class="field"><label>Priorité</label>
      <select id="taskPrio" style="width:100%">
        <option value="haute">Haute</option>
        <option value="moyenne" selected>Moyenne</option>
        <option value="basse">Basse</option>
      </select>
    </div>
    <button class="btn-login" id="saveTaskBtn">Enregistrer</button>
  </div>
</div>

<!-- MODALE MEMBRE -->
<div class="modal-overlay" id="membreModal">
  <div class="modal-box">
    <button class="modal-close-btn" data-close="membreModal">✕</button>
    <h3>Membre</h3>
    <input type="hidden" id="membreEditId">
    <div class="field"><label>Identifiant</label><input type="text" id="membreId" style="width:100%"></div>
    <div class="field"><label>Nom</label><input type="text" id="membreName" style="width:100%"></div>
    <div class="field"><label>Mot de passe</label><input type="text" id="membrePass" style="width:100%"></div>
    <div class="field"><label>Rôle</label>
      <select id="membreRole" style="width:100%">
        <option value="ddp">Directeur de Projet (DDP)</option>
        <option value="ddpa">Directeur Adjoint (DDPA)</option>
        <option value="resp-dev">Responsable Développement (RD)</option>
        <option value="developpeur">Développeur</option>
        <option value="builder">Builder</option>
        <option value="scripteur">Scripteur</option>
        <option value="testeur">Testeur</option>
        <option value="voix">Voix</option>
      </select>
    </div>
    <button class="btn-login" id="saveMembreBtn">Enregistrer</button>
  </div>
</div>

<script>
// ========== DONNÉES MEMBRES ==========
const DEFAULT_MEMBRES = [
  { id: 'guirrie', name: 'Guirrie', pass: 'Ven1793!G', role: 'ddp' },
  { id: 'lomol', name: 'Lomol', pass: 'Ven1793!L', role: 'ddp' },
  { id: 'xentrax', name: 'Xentrax', pass: 'Ven1793!X', role: 'ddp' },
  { id: '1baba', name: '1baba', pass: 'Ven1793!B', role: 'ddp' },
  { id: 'theo', name: 'Théo', pass: 'Ven1793!T', role: 'ddp' },
  { id: 'anae', name: 'Anaë', pass: 'Ven1793!A', role: 'resp-dev' },
  { id: 'elioth', name: 'Elioth', pass: 'Ven1793!E', role: 'ddpa' },
  { id: 'mael', name: 'Mael', pass: 'Ven1793!M', role: 'voix' }
];

const roleLabels = {
  ddp: 'Directeur de Projet',
  ddpa: 'Directeur Adjoint',
  'resp-dev': 'Responsable Développement',
  developpeur: 'Développeur',
  builder: 'Builder',
  scripteur: 'Scripteur',
  testeur: 'Testeur',
  voix: 'Voix'
};

function getMembres() {
  try {
    const saved = localStorage.getItem('asm_membres');
    return saved ? JSON.parse(saved) : [...DEFAULT_MEMBRES];
  } catch(e) { return [...DEFAULT_MEMBRES]; }
}

function saveMembres(list) {
  localStorage.setItem('asm_membres', JSON.stringify(list));
}

// ========== DONNÉES TÂCHES ==========
let tasks = [];

function loadTasks() {
  const saved = localStorage.getItem('asm_tasks');
  tasks = saved ? JSON.parse(saved) : [];
  renderAllTasks();
}

function saveTasks() {
  localStorage.setItem('asm_tasks', JSON.stringify(tasks));
}

function renderAllTasks() {
  const container = document.getElementById('tasks-list');
  const allContainer = document.getElementById('all-tasks-list');
  const isAdmin = currentUser && currentUser.role === 'ddp';
  
  const taskList = [...tasks].reverse();
  const recentTasks = taskList.slice(0, 5);
  
  const renderFn = (target, list) => {
    if (!target) return;
    if (list.length === 0) {
      target.innerHTML = '<div style="color:var(--cream3);">Aucune tâche</div>';
      return;
    }
    target.innerHTML = list.map(t => `
      <div class="task-item">
        <div class="task-check ${t.done ? 'done' : ''}" onclick="toggleTask('${t.id}')"></div>
        <div class="task-name ${t.done ? 'completed' : ''}" style="${t.done ? 'text-decoration:line-through;color:var(--cream3);' : ''}">${escapeHtml(t.name)}</div>
        <div class="task-assignee">${escapeHtml(t.assignee)}</div>
        <div class="task-prio prio-${t.prio}">${t.prio}</div>
        ${isAdmin ? `<div style="display:flex;gap:5px;">
          <button onclick="editTask('${t.id}')" style="background:var(--gold);color:var(--ink);border:none;padding:4px 8px;cursor:pointer;border-radius:3px;">✎</button>
          <button onclick="deleteTask('${t.id}')" style="background:var(--red);color:white;border:none;padding:4px 8px;cursor:pointer;border-radius:3px;">✕</button>
        </div>` : ''}
      </div>
    `).join('');
  };
  
  renderFn(container, recentTasks);
  if (allContainer) renderFn(allContainer, taskList);
}

window.toggleTask = function(id) {
  const task = tasks.find(t => t.id === id);
  if (task) {
    task.done = !task.done;
    saveTasks();
    renderAllTasks();
  }
};

window.editTask = function(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  editingTaskId = id;
  document.getElementById('taskModalTitle').textContent = 'Modifier la tâche';
  document.getElementById('taskName').value = task.name;
  document.getElementById('taskPrio').value = task.prio;
  populateAssigneeSelect();
  document.getElementById('taskAssignee').value = task.assignee;
  document.getElementById('taskModal').classList.add('open');
};

window.deleteTask = function(id) {
  if (!confirm('Supprimer cette tâche ?')) return;
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  renderAllTasks();
};

function addTask(name, assignee, prio) {
  const newTask = {
    id: Date.now().toString(),
    name: name,
    assignee: assignee,
    prio: prio,
    done: false,
    createdAt: Date.now()
  };
  tasks.push(newTask);
  saveTasks();
  renderAllTasks();
}

function updateTask(id, name, assignee, prio) {
  const task = tasks.find(t => t.id === id);
  if (task) {
    task.name = name;
    task.assignee = assignee;
    task.prio = prio;
    saveTasks();
    renderAllTasks();
  }
}

// ========== RENDU MEMBRES ==========
function renderMembres() {
  const membres = getMembres();
  const container = document.getElementById('membres-list');
  const fullContainer = document.getElementById('membres-full-list');
  const isAdmin = currentUser && currentUser.role === 'ddp';
  
  const renderFn = (target, list, showActions = false) => {
    if (!target) return;
    if (list.length === 0) {
      target.innerHTML = '<div style="color:var(--cream3);">Aucun membre</div>';
      return;
    }
    target.innerHTML = list.map(m => `
      <div class="task-item" style="grid-template-columns: 1fr auto;">
        <div><strong>${escapeHtml(m.name)}</strong> (${roleLabels[m.role] || m.role})<br><span style="font-size:11px;color:var(--cream3);">${escapeHtml(m.id)}</span></div>
        ${showActions && isAdmin ? `
          <div>
            <button onclick="editMembre('${m.id}')" style="background:var(--gold);color:var(--ink);border:none;padding:4px 8px;margin-right:5px;cursor:pointer;border-radius:3px;">✎</button>
            <button onclick="deleteMembre('${m.id}')" style="background:var(--red);color:white;border:none;padding:4px 8px;cursor:pointer;border-radius:3px;">✕</button>
          </div>
        ` : ''}
      </div>
    `).join('');
  };
  
  renderFn(container, membres, false);
  if (fullContainer) renderFn(fullContainer, membres, true);
}

function populateAssigneeSelect() {
  const membres = getMembres();
  const select = document.getElementById('taskAssignee');
  if (select) {
    select.innerHTML = membres.map(m => `<option value="${escapeHtml(m.name)}">${escapeHtml(m.name)} (${roleLabels[m.role]})</option>`).join('');
  }
}

// ========== CRUD MEMBRES ==========
window.editMembre = function(id) {
  const membres = getMembres();
  const m = membres.find(mb => mb.id === id);
  if (!m) return;
  document.getElementById('membreEditId').value = m.id;
  document.getElementById('membreId').value = m.id;
  document.getElementById('membreName').value = m.name;
  document.getElementById('membrePass').value = m.pass;
  document.getElementById('membreRole').value = m.role;
  document.getElementById('membreModal').classList.add('open');
};

window.deleteMembre = function(id) {
  if (!confirm('Supprimer ce membre ?')) return;
  let membres = getMembres();
  membres = membres.filter(m => m.id !== id);
  saveMembres(membres);
  renderMembres();
  populateAssigneeSelect();
};

function saveMembreFromModal() {
  const editId = document.getElementById('membreEditId').value;
  const id = document.getElementById('membreId').value.trim().toLowerCase();
  const name = document.getElementById('membreName').value.trim();
  const pass = document.getElementById('membrePass').value;
  const role = document.getElementById('membreRole').value;
  if (!id || !name || !pass) {
    alert('Veuillez remplir tous les champs');
    return;
  }
  
  let membres = getMembres();
  if (editId) {
    membres = membres.map(m => m.id === editId ? { ...m, id, name, pass, role } : m);
  } else {
    if (membres.find(m => m.id === id)) {
      alert('Cet identifiant existe déjà');
      return;
    }
    membres.push({ id, name, pass, role });
  }
  saveMembres(membres);
  document.getElementById('membreModal').classList.remove('open');
  renderMembres();
  populateAssigneeSelect();
}

// ========== GESTION CONNEXION ==========
let currentUser = null;
let editingTaskId = null;

function doLogin() {
  const role = document.getElementById('login-role').value;
  const userId = document.getElementById('login-user').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value;
  const errorDiv = document.getElementById('login-error');
  
  console.log('Tentative de connexion:', { role, userId, pass });
  
  if (!role || !userId || !pass) {
    errorDiv.textContent = 'Veuillez remplir tous les champs';
    errorDiv.style.display = 'block';
    return;
  }
  
  const membres = getMembres();
  console.log('Membres disponibles:', membres);
  
  const user = membres.find(m => m.id === userId && m.pass === pass && m.role === role);
  
  if (!user) {
    errorDiv.textContent = 'Identifiant, mot de passe ou rôle incorrect';
    errorDiv.style.display = 'block';
    return;
  }
  
  console.log('Connexion réussie pour:', user);
  
  currentUser = user;
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('user-name').textContent = user.name;
  document.getElementById('user-role-label').textContent = roleLabels[user.role] || user.role;
  document.getElementById('user-avatar').textContent = user.name.charAt(0).toUpperCase();
  document.getElementById('welcome-msg').textContent = `Bienvenue, ${user.name}`;
  document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  
  // Afficher/cacher bouton ajout membre selon rôle
  const isAdmin = user.role === 'ddp';
  document.getElementById('btn-add-membre').style.display = isAdmin ? 'inline-block' : 'none';
  
  renderMembres();
  loadTasks();
  populateAssigneeSelect();
}

function doLogout() {
  currentUser = null;
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-role').value = '';
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// ========== GESTION MODALES TÂCHE ==========
function openTaskModal() {
  editingTaskId = null;
  document.getElementById('taskModalTitle').textContent = 'Nouvelle tâche';
  document.getElementById('taskName').value = '';
  document.getElementById('taskPrio').value = 'moyenne';
  populateAssigneeSelect();
  document.getElementById('taskModal').classList.add('open');
}

function saveTaskFromModal() {
  const name = document.getElementById('taskName').value.trim();
  const assignee = document.getElementById('taskAssignee').value;
  const prio = document.getElementById('taskPrio').value;
  if (!name) {
    alert('Veuillez entrer un titre');
    return;
  }
  if (editingTaskId) {
    updateTask(editingTaskId, name, assignee, prio);
  } else {
    addTask(name, assignee, prio);
  }
  document.getElementById('taskModal').classList.remove('open');
  editingTaskId = null;
}

// ========== INITIALISATION ==========
document.addEventListener('DOMContentLoaded', function() {
  console.log('Page chargée, initialisation...');
  
  // Navigation
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', function() {
      const panelId = this.dataset.panel;
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById(`panel-${panelId}`).classList.add('active');
      this.classList.add('active');
      const titles = { home: 'Tableau de bord', tasks: 'Tâches', membres: 'Membres' };
      document.getElementById('topbar-title').textContent = titles[panelId] || 'ASM';
    });
  });
  
  // Boutons connexion
  const loginBtn = document.getElementById('loginBtn');
  if (loginBtn) {
    loginBtn.addEventListener('click', doLogin);
    console.log('Bouton login attaché');
  } else {
    console.error('Bouton login non trouvé !');
  }
  
  // Enter key sur password
  document.getElementById('login-pass').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  
  // Déconnexion
  document.getElementById('logoutBtn').addEventListener('click', doLogout);
  
  // Ajout tâche
  document.getElementById('btn-add-task').addEventListener('click', openTaskModal);
  document.getElementById('btn-add-task-full').addEventListener('click', openTaskModal);
  document.getElementById('saveTaskBtn').addEventListener('click', saveTaskFromModal);
  
  // Ajout membre
  document.getElementById('btn-add-membre').addEventListener('click', function() {
    document.getElementById('membreEditId').value = '';
    document.getElementById('membreId').value = '';
    document.getElementById('membreName').value = '';
    document.getElementById('membrePass').value = '';
    document.getElementById('membreRole').value = 'ddp';
    document.getElementById('membreModal').classList.add('open');
  });
  document.getElementById('saveMembreBtn').addEventListener('click', saveMembreFromModal);
  
  // Fermeture modales
  document.querySelectorAll('.modal-close-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const modalId = this.dataset.close;
      document.getElementById(modalId).classList.remove('open');
    });
  });
  
  // Click outside
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open');
    });
  });
});
</script>
