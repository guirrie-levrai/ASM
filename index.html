<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC6C4u4CW25tQ1IJZTSgIZi6OFeu-KzCWg",
  authDomain: "asmm-cefcf.firebaseapp.com",
  projectId: "asmm-cefcf",
  storageBucket: "asmm-cefcf.firebasestorage.app",
  messagingSenderId: "784738924514",
  appId: "1:784738924514:web:17e52bf8d4d7ed7d1a2bbb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ═══ COMPTES ÉQUIPE ═══
const ACCOUNTS = {
  guirrie: { pass:'A3cdmm33', role:'directeur', label:'Directeur de Projet', name:'Guirrie' },
  lomol: { pass:'Lachasse', role:'directeur', label:'Directeur de Projet', name:'Lomol' },
  xentrax: { pass:'Xenleplusbo', role:'directeur', label:'Directeur de Projet', name:'Xentrax' },
  '1baba': { pass:'Ven1793!B', role:'directeur', label:'Directeur de Projet', name:'1baba' },
  theo: { pass:'Ven1793!T', role:'directeur', label:'Directeur de Projet', name:'Théo' },
  anae: { pass:'Pierre', role:'resp-dev', label:'Responsable Développement', name:'Anaë' },
  elioth: { pass:'Ven1793!E', role:'staff', label:'Staff', name:'Elioth' },
};

// ═══ ÉTAT LOCAL ═══
let tasks = [];
let actes = [
  { id:'acte1', num:'Acte I', name:'La Terre et le Ciel', pct:0, status:'todo' },
  { id:'acte2', num:'Acte II', name:'Les Premiers Grondements', pct:0, status:'todo' },
  { id:'acte3', num:'Acte III', name:'Le Raid', pct:0, status:'todo' },
  { id:'acte4', num:'Acte IV', name:'Le Soulèvement', pct:0, status:'todo' },
  { id:'acte5', num:'Acte V', name:'Frères d\'Armes', pct:0, status:'todo' },
  { id:'acte6', num:'Acte VI', name:'Les Victoires', pct:0, status:'todo' },
  { id:'acte7', num:'Acte VII', name:'La Déroute', pct:0, status:'todo' },
  { id:'acte8', num:'Acte VIII', name:'L\'Hiver des Loups', pct:0, status:'todo' },
  { id:'acte9', num:'Acte IX', name:'Les Colonnes Infernales', pct:0, status:'todo' },
  { id:'acte10', num:'Acte X', name:'La Fin d\'un Monde', pct:0, status:'todo' },
];
let notes = [];
let notesUnsubscribe = null;
let taskFilter = 'all';
let currentUser = null;
const barFill = { done:'#7EC89A', wip:'var(--gold)', todo:'rgba(255,255,255,0.15)' };

// ═══ LOGIN ═══
window.doLogin = function() {
  const role = document.getElementById('login-role').value;
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  if (!role || !user || !pass) { err.style.display='block'; err.textContent='Veuillez remplir tous les champs.'; return; }
  const acc = ACCOUNTS[user.toLowerCase()];
  if (!acc || acc.pass !== pass || acc.role !== role) { err.style.display='block'; err.textContent='Identifiant ou mot de passe incorrect.'; return; }
  err.style.display = 'none';
  currentUser = { ...acc, id: user };
  enterDashboard();
}

function enterDashboard() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('user-name').textContent = currentUser.name;
  document.getElementById('user-role-label').textContent = currentUser.label;
  document.getElementById('user-avatar').textContent = currentUser.name[0].toUpperCase();
  document.getElementById('welcome-msg').textContent = `Bienvenue, ${currentUser.name}.`;
  document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('fr-FR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  listenTasks();
  loadActes();
  listenNotes();   // ← Notes en temps réel
}

// ═══ LOGOUT ═══
window.doLogout = function() {
  if (notesUnsubscribe) notesUnsubscribe();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-role').value = '';
  currentUser = null;
}

// ═══ PANELS ═══
window.showPanel = function(id, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  el.classList.add('active');
  const titles = { home:'Tableau de bord', tasks:'Tâches', progress:'Avancement', notes:'Notes & Documents' };
  document.getElementById('topbar-title').textContent = titles[id] || '';
}

// ═══ TÂCHES ═══
function listenTasks() {
  onSnapshot(collection(db, 'tasks'), snap => {
    tasks = snap.docs.map(d => ({ firestoreId: d.id, ...d.data() }));
    renderTasks();
    updateDoneCount();
    renderMiniProgress();
  });
}

function renderTasks() {
  const list = document.getElementById('tasks-list');
  list.innerHTML = '';
  const filtered = tasks.filter(t => {
    if (taskFilter === 'todo') return !t.done;
    if (taskFilter === 'done') return t.done;
    if (taskFilter === 'haute') return t.prio === 'haute' && !t.done;
    return true;
  });
  if (filtered.length === 0) {
    list.innerHTML = '<div style="color:var(--cream3);font-style:italic;font-size:14px;padding:16px 0">Aucune tâche.</div>';
    return;
  }
  filtered.forEach(t => {
    const div = document.createElement('div');
    div.className = 'task-item' + (t.done ? ' completed' : '');
    div.innerHTML = `
      <div class="task-check ${t.done ? 'done' : ''}" onclick="window.toggleTask('${t.firestoreId}', ${t.done})"></div>
      <div class="task-name">${t.name}</div>
      <div class="task-assignee">${t.assignee}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="task-prio prio-${t.prio}">${t.prio}</div>
        <div onclick="window.deleteTask('${t.firestoreId}')" style="cursor:pointer;color:var(--cream3);font-size:16px;line-height:1;padding:2px 6px;border:1px solid var(--border);transition:color .15s" onmouseover="this.style.color='#E89090'" onmouseout="this.style.color='var(--cream3)'">✕</div>
      </div>`;
    list.appendChild(div);
  });
}

window.toggleTask = async function(firestoreId, done) {
  await updateDoc(doc(db, 'tasks', firestoreId), { done: !done });
}
window.deleteTask = async function(firestoreId) {
  if (confirm('Supprimer cette tâche ?')) await deleteDoc(doc(db, 'tasks', firestoreId));
}
window.filterTasks = function(f, btn) {
  taskFilter = f;
  document.querySelectorAll('.task-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTasks();
}
function updateDoneCount() {
  document.getElementById('tasks-done-count').textContent = tasks.filter(t => t.done).length;
}
window.openTaskModal = () => document.getElementById('task-modal').classList.add('open');
window.closeTaskModal = () => document.getElementById('task-modal').classList.remove('open');
window.closeTaskModalOutside = e => { if (e.target === document.getElementById('task-modal')) window.closeTaskModal(); }
window.addTask = async function() {
  const name = document.getElementById('new-task-name').value.trim();
  if (!name) return;
  await addDoc(collection(db, 'tasks'), {
    name,
    assignee: document.getElementById('new-task-assignee').value,
    prio: document.getElementById('new-task-prio').value,
    done: false,
    createdAt: Date.now()
  });
  document.getElementById('new-task-name').value = '';
  window.closeTaskModal();
}

// ═══ ACTES ═══
async function loadActes() {
  const snap = await getDocs(collection(db, 'actes'));
  if (!snap.empty) {
    snap.docs.forEach(d => {
      const i = actes.findIndex(a => a.id === d.id);
      if (i !== -1) actes[i] = { ...actes[i], ...d.data() };
    });
  } else {
    for (const a of actes) await setDoc(doc(db, 'actes', a.id), { pct: a.pct, status: a.status });
  }
  renderActes();
  renderMiniProgress();
}

function renderActes() {
  const list = document.getElementById('actes-list');
  list.innerHTML = '';
  actes.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'acte-item';
    div.innerHTML = `
      <div class="acte-header">
        <div class="acte-left">
          <span class="acte-num">${a.num}</span>
          <span class="acte-name">${a.name}</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <select onchange="window.updateActeStatus(${i}, this.value)" style="background:var(--ink4);border:1px solid var(--border);color:var(--cream);font-family:'Crimson Pro',serif;font-size:12px;padding:3px 8px;cursor:pointer;outline:none;">
            <option value="todo" ${a.status==='todo'?'selected':''}>À venir</option>
            <option value="wip" ${a.status==='wip' ?'selected':''}>En cours</option>
            <option value="done" ${a.status==='done'?'selected':''}>Terminé</option>
          </select>
          <span style="font-size:12px;color:var(--cream3);font-family:'JetBrains Mono',monospace;min-width:36px;text-align:right" id="pct-label-${i}">${a.pct}%</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-top:8px">
        <div class="acte-bar-bg" style="flex:1">
          <div class="acte-bar" id="bar-${i}" style="width:${a.pct}%;background:${barFill[a.status]}"></div>
        </div>
        <input type="range" min="0" max="100" value="${a.pct}"
          style="width:110px;accent-color:var(--gold);cursor:pointer"
          oninput="window.updateActePct(${i}, this.value)">
      </div>`;
    list.appendChild(div);
  });
}

window.updateActePct = async function(i, val) {
  actes[i].pct = parseInt(val);
  document.getElementById('bar-' + i).style.width = val + '%';
  document.getElementById('pct-label-' + i).textContent = val + '%';
  if (val == 100) actes[i].status = 'done';
  else if (val > 0 && actes[i].status === 'todo') actes[i].status = 'wip';
  await setDoc(doc(db, 'actes', actes[i].id), { pct: actes[i].pct, status: actes[i].status });
  renderActes();
  renderMiniProgress();
}

window.updateActeStatus = async function(i, val) {
  actes[i].status = val;
  if (val === 'done') actes[i].pct = 100;
  if (val === 'todo') actes[i].pct = 0;
  await setDoc(doc(db, 'actes', actes[i].id), { pct: actes[i].pct, status: actes[i].status });
  renderActes();
  renderMiniProgress();
}

function renderMiniProgress() {
  const el = document.getElementById('mini-progress');
  el.innerHTML = '';
  actes.slice(0, 5).forEach(a => {
    const row = document.createElement('div');
    row.style.cssText = 'margin-bottom:12px';
    row.innerHTML = `
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:13px;color:var(--cream2)">${a.num} — ${a.name}</span>
        <span style="font-size:11px;color:var(--cream3);font-family:'JetBrains Mono',monospace">${a.pct}%</span>
      </div>
      <div class="acte-bar-bg">
        <div class="acte-bar" style="width:${a.pct}%;background:${barFill[a.status]}"></div>
      </div>`;
    el.appendChild(row);
  });
  const more = document.createElement('div');
  more.style.cssText = 'font-size:12px;font-style:italic;color:var(--cream3);margin-top:8px;cursor:pointer';
  more.textContent = '→ Voir tous les actes';
  more.onclick = () => {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-progress').classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.nav-item')[2].classList.add('active');
    document.getElementById('topbar-title').textContent = 'Avancement';
  };
  el.appendChild(more);
}

// ═══ NOTES & DOCS (Firestore - tout le monde voit en temps réel) ═══
function listenNotes() {
  if (notesUnsubscribe) notesUnsubscribe();
  notesUnsubscribe = onSnapshot(collection(db, 'notes'), (snap) => {
    notes = snap.docs.map(d => ({ firestoreId: d.id, ...d.data() }));
    renderNotes();
  });
}

function renderNotes() {
  const grid = document.querySelector('.notes-grid');
  grid.innerHTML = '';
  notes.forEach((note) => {
    const div = document.createElement('div');
    div.className = `note-card ${note.color || 'gold'}`;
    div.innerHTML = `
      <div class="note-tag">${note.tag || 'Note'}</div>
      <div class="note-title">${note.title}</div>
      <div class="note-preview">${note.preview || ''}</div>
      <div class="note-meta"><span>${note.author || 'Équipe'}</span><span>${note.date}</span></div>
      <button onclick="deleteNote('${note.firestoreId}'); event.stopImmediatePropagation()" style="position:absolute;top:12px;right:12px;background:none;border:none;color:var(--cream3);font-size:18px;cursor:pointer">✕</button>`;
    div.onclick = () => editNote(note.firestoreId);
    grid.appendChild(div);
  });
}

window.addNewNote = async function() {
  const title = prompt("Titre de la note :");
  if (!title) return;
  const preview = prompt("Contenu / aperçu :") || "";
  const tag = prompt("Catégorie :") || "Note";
  const color = prompt("Couleur (gold/red/green/blue) :") || "gold";

  await addDoc(collection(db, 'notes'), {
    title,
    preview,
    tag,
    color,
    author: currentUser.name,
    date: new Date().toLocaleDateString('fr-FR'),
    createdAt: Date.now()
  });
};

window.deleteNote = async function(id) {
  if (confirm("Supprimer cette note ?")) {
    await deleteDoc(doc(db, 'notes', id));
  }
};

window.editNote = async function(id) {
  const note = notes.find(n => n.firestoreId === id);
  if (!note) return;
  const title = prompt("Titre :", note.title);
  if (title === null) return;
  const preview = prompt("Contenu :", note.preview) || note.preview;
  await updateDoc(doc(db, 'notes', id), { title, preview });
};

// Bouton + Nouvelle note
document.querySelector('#panel-notes .btn-add').onclick = addNewNote;

// Lancement
listenNotes();
</script>
